name: "Deploy FastAPI to EC2"
description: "Install dependencies and deploy the FastAPI app as a systemd service on EC2"
inputs:
  app-directory:
    description: "Application directory on the self-hosted runner"
    required: false
    default: "."
  service-name:
    description: "Systemd service name for the FastAPI app"
    required: false
    default: "fintechbackend"
  host:
    description: "FastAPI host binding"
    required: false
    default: "0.0.0.0"
  port:
    description: "FastAPI port"
    required: false
    default: "8000"
  health-url:
    description: "Health check URL for the deployed app"
    required: false
    default: "http://127.0.0.1:8000/health"
  database-url:
    description: "Database URL used by the app"
    required: false
    default: ""
  secret-key:
    description: "JWT secret key used by the app"
    required: true
  algorithm:
    description: "JWT signing algorithm"
    required: false
    default: "HS256"
  access-token-expire-minutes:
    description: "Access token lifetime in minutes"
    required: false
    default: "60"
runs:
  using: "composite"
  steps:
    - name: Install And Start FastAPI
      shell: bash
      env:
        APP_DIRECTORY: ${{ inputs.app-directory }}
        SERVICE_NAME: ${{ inputs.service-name }}
        APP_HOST: ${{ inputs.host }}
        APP_PORT: ${{ inputs.port }}
        HEALTH_URL: ${{ inputs.health-url }}
        DATABASE_URL_INPUT: ${{ inputs.database-url }}
        SECRET_KEY_INPUT: ${{ inputs.secret-key }}
        ALGORITHM_INPUT: ${{ inputs.algorithm }}
        ACCESS_TOKEN_EXPIRE_MINUTES_INPUT: ${{ inputs.access-token-expire-minutes }}
      run: |
        set -euo pipefail
        cd "$APP_DIRECTORY"
        APP_USER="$(whoami)"
        VENV_PYTHON="${APP_DIRECTORY}/.venv/bin/python"

        DATABASE_URL_VALUE="${DATABASE_URL_INPUT:-sqlite:///./finance.db}"
        ALGORITHM_VALUE="${ALGORITHM_INPUT:-HS256}"
        ACCESS_TOKEN_EXPIRE_MINUTES_VALUE="${ACCESS_TOKEN_EXPIRE_MINUTES_INPUT:-60}"

        cat > .deployment.env <<EOF
        DATABASE_URL=${DATABASE_URL_VALUE}
        SECRET_KEY=${SECRET_KEY_INPUT}
        ALGORITHM=${ALGORITHM_VALUE}
        ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES_VALUE}
        EOF

        mkdir -p logs

        uv sync --frozen

        if [ ! -x "$VENV_PYTHON" ]; then
          echo "Virtualenv python not found at $VENV_PYTHON"
          exit 1
        fi

        sudo tee "/etc/systemd/system/${SERVICE_NAME}.service" > /dev/null <<EOF
        [Unit]
        Description=FintechBackend FastAPI Service
        After=network.target

        [Service]
        Type=simple
        User=${APP_USER}
        WorkingDirectory=${APP_DIRECTORY}
        EnvironmentFile=${APP_DIRECTORY}/.deployment.env
        ExecStart=${VENV_PYTHON} -m uvicorn app.main:app --host ${APP_HOST} --port ${APP_PORT}
        Restart=always
        RestartSec=5
        StandardOutput=append:${APP_DIRECTORY}/logs/systemd.log
        StandardError=append:${APP_DIRECTORY}/logs/systemd.log

        [Install]
        WantedBy=multi-user.target
        EOF

        sudo systemctl daemon-reload
        sudo systemctl enable "${SERVICE_NAME}.service"
        sudo systemctl restart "${SERVICE_NAME}.service"

        sleep 8

        curl --fail --silent --show-error --max-time 10 "$HEALTH_URL"
        sudo systemctl --no-pager --full status "${SERVICE_NAME}.service"
