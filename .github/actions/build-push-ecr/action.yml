name: "Build And Push Docker Image"
description: "Build the FastAPI Docker image and push it to Amazon ECR"
inputs:
  app-directory:
    description: "Application directory on the runner"
    required: false
    default: "."
  ecr-registry:
    description: "Amazon ECR registry URL"
    required: true
  ecr-repository:
    description: "Amazon ECR repository name"
    required: true
  image-tag:
    description: "Docker image tag"
    required: true
outputs:
  image-uri:
    description: "Built Docker image URI"
    value: ${{ steps.build_push.outputs.image_uri }}
runs:
  using: "composite"
  steps:
    - name: Build And Push Image
      id: build_push
      shell: bash
      env:
        APP_DIRECTORY: ${{ inputs.app-directory }}
        ECR_REGISTRY: ${{ inputs.ecr-registry }}
        ECR_REPOSITORY: ${{ inputs.ecr-repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
      run: |
        set -euo pipefail
        cd "$APP_DIRECTORY"

        IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

        docker build -t "$IMAGE_URI" .
        docker push "$IMAGE_URI"

        echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
