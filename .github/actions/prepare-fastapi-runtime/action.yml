name: "Prepare FastAPI Runtime"
description: "Stop the previous FastAPI process and prepare runtime folders"
inputs:
  app-directory:
    description: "Application directory on the self-hosted runner"
    required: false
    default: "."
  pid-file:
    description: "PID file used for the running FastAPI process"
    required: false
    default: "fastapi.pid"
runs:
  using: "composite"
  steps:
    - name: Stop Existing FastAPI Process
      shell: bash
      env:
        APP_DIRECTORY: ${{ inputs.app-directory }}
        PID_FILE: ${{ inputs.pid-file }}
      run: |
        set -euo pipefail
        cd "$APP_DIRECTORY"

        mkdir -p logs

        if [ -f "$PID_FILE" ]; then
          EXISTING_PID="$(cat "$PID_FILE")"
          if kill -0 "$EXISTING_PID" 2>/dev/null; then
            echo "Stopping FastAPI process $EXISTING_PID"
            kill "$EXISTING_PID"
            sleep 3
          fi
          rm -f "$PID_FILE"
        fi

        pkill -f "uvicorn app.main:app" 2>/dev/null || true

        find . -type d -name "__pycache__" -prune -exec rm -rf {} +
        find . -type f -name "*.pyc" -delete

        echo "Runtime preparation complete"
