name: "Prepare FastAPI Runtime"
description: "Stop the existing FastAPI systemd service and prepare runtime folders"
inputs:
  app-directory:
    description: "Application directory on the self-hosted runner"
    required: false
    default: "."
  service-name:
    description: "Systemd service name for the FastAPI app"
    required: false
    default: "fintechbackend"
runs:
  using: "composite"
  steps:
    - name: Stop Existing FastAPI Service
      shell: bash
      env:
        APP_DIRECTORY: ${{ inputs.app-directory }}
        SERVICE_NAME: ${{ inputs.service-name }}
      run: |
        set -euo pipefail
        cd "$APP_DIRECTORY"

        mkdir -p logs

        if sudo systemctl list-unit-files | grep -q "^${SERVICE_NAME}\.service"; then
          echo "Stopping service ${SERVICE_NAME}.service"
          sudo systemctl stop "${SERVICE_NAME}.service" || true
        fi

        pkill -f "uvicorn app.main:app" 2>/dev/null || true

        find . -type d -name "__pycache__" -prune -exec rm -rf {} +
        find . -type f -name "*.pyc" -delete

        echo "Runtime preparation complete"
