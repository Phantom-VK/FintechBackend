name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".gitignore"
  workflow_dispatch:

jobs:
  validate:
    name: Validate FastAPI Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install Dependencies
        run: uv sync --frozen --dev

      - name: Compile Application
        run: uv run python -m compileall app tests

      - name: Run Tests
        run: uv run python -m unittest discover -s tests -v

      - name: Run Lint
        run: uv run pylint app tests
